<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self'; media-src 'self' file:"
    />
    <title>番茄钟</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="app-menu" aria-label="应用菜单">
      <span class="app-menu__brand">🍅</span>
      <details class="menu-group">
        <summary>文件</summary>
        <div class="menu-popup">
          <button data-menu-action="settings">设置 <kbd>Ctrl+,</kbd></button>
          <hr />
          <button data-app-action="quit">退出</button>
        </div>
      </details>
      <details class="menu-group">
        <summary>编辑</summary>
        <div class="menu-popup">
          <button data-edit-command="undo">撤销 <kbd>Ctrl+Z</kbd></button>
          <button data-edit-command="redo">重做 <kbd>Ctrl+Y</kbd></button>
          <hr />
          <button data-edit-command="cut">剪切 <kbd>Ctrl+X</kbd></button>
          <button data-edit-command="copy">复制 <kbd>Ctrl+C</kbd></button>
          <button data-edit-command="paste">粘贴 <kbd>Ctrl+V</kbd></button>
          <button data-edit-command="selectAll">全选 <kbd>Ctrl+A</kbd></button>
        </div>
      </details>
      <details class="menu-group">
        <summary>查看</summary>
        <div class="menu-popup">
          <button data-zoom-delta="0.1">放大 <kbd>Ctrl++</kbd></button>
          <button data-zoom-delta="-0.1">缩小 <kbd>Ctrl+-</kbd></button>
          <button data-zoom-reset>重置缩放 <kbd>Ctrl+0</kbd></button>
          <hr />
          <button data-app-action="reload">重新加载</button>
          <button data-app-action="fullscreen">切换全屏</button>
        </div>
      </details>
      <details class="menu-group">
        <summary>帮助</summary>
        <div class="menu-popup">
          <button data-menu-action="about">关于番茄钟</button>
        </div>
      </details>
    </nav>
    <main>
      <section class="panel task-panel">
        <div id="task-board" class="task-board">
          <div class="root-column" aria-label="大项">
            <div id="root-list" class="root-list"></div>
            <button id="new-root" class="new-root-button" title="新建大项" aria-label="新建大项">
              +
            </button>
          </div>
          <div class="child-column" aria-label="子项">
            <div id="empty-state" class="empty compact">暂无子项</div>
            <div id="task-tree" class="task-tree"></div>
          </div>
        </div>
      </section>
    </main>
    <div id="task-context-menu" class="context-menu" hidden>
      <button data-context-action="child">新建子项</button>
      <button data-context-action="toggle">标记完成</button>
      <button data-context-action="expand">展开所有子项</button>
      <button data-context-action="collapse">折叠所有子项</button>
      <button data-context-action="delete">删除</button>
    </div>
    <dialog id="task-dialog">
      <form id="task-form" method="dialog">
        <h2 id="dialog-title">新建事项</h2>
        <input type="hidden" id="parent-id" />
        <label for="task-title">名称</label
        ><input id="task-title" maxlength="100" required placeholder="例如：学习计划" />
        <label for="task-notes">备注（可选）</label
        ><textarea id="task-notes" rows="3" placeholder="补充说明、目标或下一步"></textarea>
        <div class="dialog-actions">
          <button type="button" id="cancel-dialog">取消</button
          ><button class="primary" type="submit">保存</button>
        </div>
      </form>
    </dialog>
    <dialog id="settings-dialog">
      <form method="dialog">
        <h2>设置</h2>
        <label for="language-select">界面语言</label>
        <select id="language-select" disabled>
          <option value="zh-CN" selected>简体中文（默认）</option>
        </select>
        <label for="zoom-range">界面缩放</label>
        <div class="zoom-setting">
          <input id="zoom-range" type="range" min="50" max="200" step="10" value="100" />
          <strong id="zoom-value">100%</strong>
        </div>
        <label for="focus-durations">专注时长（分钟）</label>
        <input id="focus-durations" inputmode="numeric" placeholder="15, 25, 45" />
        <label for="break-durations">休息时长（分钟）</label>
        <input id="break-durations" inputmode="numeric" placeholder="5, 10" />
        <label class="checkbox-setting" for="timer-popup-topmost">
          <input id="timer-popup-topmost" type="checkbox" checked />
          <span>弹出的计时窗口置顶显示</span>
        </label>
        <label for="database-path">数据库文件</label>
        <div class="path-setting">
          <input id="database-path" readonly />
          <button type="button" id="choose-database-path">选择...</button>
        </div>
        <label for="focus-end-sound">专注结束提示音</label>
        <div class="path-setting">
          <input id="focus-end-sound" readonly />
          <button type="button" data-sound-action="choose" data-sound-kind="focusEnd">
            选择...
          </button>
          <button type="button" data-sound-action="clear" data-sound-kind="focusEnd">默认</button>
        </div>
        <label for="break-end-sound">休息结束提示音</label>
        <div class="path-setting">
          <input id="break-end-sound" readonly />
          <button type="button" data-sound-action="choose" data-sound-kind="breakEnd">
            选择...
          </button>
          <button type="button" data-sound-action="clear" data-sound-kind="breakEnd">默认</button>
        </div>
        <p class="settings-hint">快捷键：Ctrl + + 放大，Ctrl + - 缩小，Ctrl + 0 重置。</p>
        <div class="dialog-actions"><button class="primary" type="submit">完成</button></div>
      </form>
    </dialog>
    <dialog id="about-dialog">
      <form method="dialog">
        <h2>关于番茄钟</h2>
        <p>支持分级事项和本地记录的专注工具。</p>
        <div class="dialog-actions"><button class="primary" type="submit">确定</button></div>
      </form>
    </dialog>
    <script src="renderer.js"></script>
  </body>
</html>
