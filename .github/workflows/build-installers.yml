name: Build and release installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting and lint
        run: npm run check

      - name: Run tests
        run: npm test

  build:
    name: Build ${{ matrix.label }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            command: npm run dist:win:x64
            artifact: windows-x64
            path: dist/*-win-x64.exe
          - label: Windows x86
            os: windows-latest
            command: npm run dist:win:ia32
            artifact: windows-x86
            path: dist/*-win-ia32.exe
          - label: Linux x64 AppImage
            os: ubuntu-latest
            command: npm run dist:linux
            artifact: linux-x64-appimage
            path: dist/*-linux-x86_64.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: ${{ matrix.command }}

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/*
          --repo "${GITHUB_REPOSITORY}"
          --title "Pomodoro Tracker ${GITHUB_REF_NAME}"
          --generate-notes
