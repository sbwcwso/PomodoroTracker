name: Build and release installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting and lint
        run: npm run check

      - name: Run tests
        run: npm test

  build:
    name: Build ${{ matrix.label }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            command: npm run dist:win:x64
            artifact: windows-x64
            path: dist/*-win-x64.exe
          - label: Windows x86
            os: windows-latest
            command: npm run dist:win:ia32
            artifact: windows-x86
            path: dist/*-win-ia32.exe
          - label: Linux x64 AppImage
            os: ubuntu-latest
            command: npm run dist:linux
            artifact: linux-x64-appimage
            path: dist/*-linux-x86_64.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: ${{ matrix.command }}

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
          retention-days: 14

  android:
    name: Build Android APK
    needs: quality
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Sync Android project
        run: npm run android:sync

      - name: Restore release signing key
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.p12

      - name: Build APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [[ -f app/release.p12 ]]; then
            export ANDROID_KEYSTORE_PATH=release.p12
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Verify APK signature
        run: |
          APK_PATH="$(find android/app/build/outputs/apk -name '*.apk' -type f | head -n 1)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose --print-certs "$APK_PATH"

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          if [[ -f android/app/build/outputs/apk/release/app-release.apk ]]; then
            cp android/app/build/outputs/apk/release/app-release.apk \
              dist/pomodoro-tracker-${{ github.ref_name }}-android.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk \
              dist/pomodoro-tracker-${{ github.ref_name }}-android-debug.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/*
          --repo "${GITHUB_REPOSITORY}"
          --title "Pomodoro Tracker ${GITHUB_REF_NAME}"
          --generate-notes
